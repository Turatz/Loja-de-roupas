{% extends 'loja/base.html' %}
{% load static %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
{% endblock %}

{% block content %}

<div class="form-container">
    <h2>Entrar</h2>

    {% if erro %}
        <p class="erro">{{ erro }}</p>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Usuário</label>
            <input type="text" name="username" required>
        </div>
        <div class="form-group">
            <label>Senha</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit">Entrar</button>
        <p class="form-link">Não tem conta? <a href="{% url 'cadastro' %}">Cadastre-se</a></p>
    </form>
</div>

{% endblock %}
